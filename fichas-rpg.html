<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas de RPG - Iniciantes</title>
<style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; }
    
    .ficha {
        width: 32%;
        border: 2px solid #000;
        border-radius: 8px;
        padding: 15px;
        background: #fff;
        margin-bottom: 20px;
    }
    
    h2 { text-align: center; text-transform: uppercase; font-size: 18px; margin-top: 0; border-bottom: 2px solid #000; padding-bottom: 10px; }
    
    .linha { margin-bottom: 12px; }
    .linha label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 4px; }
    .linha .campo { border-bottom: 1px solid #666; width: 100%; height: 20px; }
    
    .status-container { display: flex; justify-content: space-between; margin-top: 15px; margin-bottom: 15px; }
    
    .atributo {
        border: 2px solid #000;
        border-radius: 5px;
        width: 30%;
        text-align: center;
        padding: 10px 0;
    }
    .atributo span { display: block; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .atributo .valor { font-size: 24px; margin-top: 5px; height: 30px; }
    
    .vida-box {
        border: 2px solid #000;
        text-align: center;
        padding: 10px;
        font-weight: bold;
        margin-bottom: 15px;
        background-color: #f0f0f0;
    }
    
    .caixa-texto {
        border: 1px solid #000;
        height: 60px;
        width: 100%;
        margin-top: 5px;
    }

    @media print {
        body { padding: 0; }
        .ficha { width: 31%; margin: 1%; page-break-inside: avoid; }
    }
</style>
</head>
<body>

    <div class="ficha">
        <h2>Ficha de Personagem</h2>
        <div class="linha"><label>Jogador:</label><div class="campo"></div></div>
        <div class="linha"><label>Personagem:</label><div class="campo"></div></div>
        <div class="linha"><label>Classe:</label><div class="campo"></div></div>
        
        <div class="vida-box">
            VIDA (HP): _____ / 15
        </div>

        <div class="status-container">
            <div class="atributo"><span>Físico</span><div class="valor"></div></div>
            <div class="atributo"><span>Agilidade</span><div class="valor"></div></div>
            <div class="atributo"><span>Mente</span><div class="valor"></div></div>
        </div>

        <div class="linha">
            <label>Arma / Ataque:</label>
            <div class="caixa-texto"></div>
        </div>
        
        <div class="linha">
            <label>Habilidade / Magia:</label>
            <div class="caixa-texto"></div>
        </div>
        
        <div class="linha">
            <label>Inventário:</label>
            <div class="caixa-texto" style="height: 100px;"></div>
        </div>
    </div>
